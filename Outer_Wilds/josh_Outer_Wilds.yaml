name: josh_ow
description: Reach the eye of the universe
game: Outer Wilds
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.
  game:
    Outer Wilds: 1.2.0 # Version of the world required for this yaml to work as expected.
Outer Wilds:
  enable_eote_dlc: 'false'
  goal: song_of_five

  ###############################
  # Spawn & General Progression #
  ###############################
  spawn: vanilla
  early_key_item:
    'off': 0
    any: 0
    translator: 0
    nomai_warp_codes: 0
    launch_codes: 1

  randomize_warp_platforms: 'false'
  split_translator: 'false'
  logsanity: 'false'
  shuffle_spacesuit: 'false'

  #########################################
  # Additional Non-Logical Randomizations #
  #########################################
  randomize_coordinates: 'true'
  randomize_orbits: 'true'
  randomize_rotations: 'true'
  randomize_dark_bramble_layout: 'false'

  ##################################
  # (Non-Progression) Item Options #
  ##################################
  trap_chance: '15'
  trap_type_weights:
    Audio Trap: 1
    HUD Corruption Trap: 1
    Ice Physics Trap: 0
    Map Disable Trap: 0
    Nap Trap: 2
    Ship Damage Trap: 2
    Suit Puncture Trap: 1
    Supernova Trap: 0
  upgrade_counts:
    # 50%, 100%, 150%, 200%
    Boost Duration Upgrade: 3
    Fuel Capacity Upgrade: 3
    Oxygen Capacity Upgrade: 3

  death_link: 'off'
