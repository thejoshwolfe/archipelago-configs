name: josh_smw
description: Collect 50 golden yoshi eggs and defeat Bowser.
game: 'SMW: Spicy Mycena Waffles'
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.
  game:
    'SMW: Spicy Mycena Waffles': 1.2.8 # Version of the world required for this yaml to work as expected.
'SMW: Spicy Mycena Waffles':
  goal: bowser
  yoshi_egg_count: '50'
  percentage_of_yoshi_eggs: '85'
  yoshi_egg_placement:
    - Castles
    - Ghost Houses
    - Switch Palaces
    - Special Zone

  ability_shuffle:
    - Carry
    #- Climb
    #- Run
    - Spin Jump
    - Swim
    - Powerups
    - Super Star
    - Yoshi
    - Item Box
    - P-Balloon
    - P-Switch
    #- Midway Points
    - Yellow Switch Palace
    - Green Switch Palace
    - Red Switch Palace
    - Blue Switch Palace
    - Special World

  game_logic_difficulty: easy
  inventory_yoshi_logic: 'false'
  decoupled_yoshi_carry: 'true'
  decoupled_wall_run_anywhere: 'true'
  decoupled_fast_swimming: 'false'

  ####################
  # Location Options #
  ####################
  dragon_coin_checks: 'false'
  moon_checks: 'true'
  hidden_1up_checks: 'false'
  star_block_checks: 'false'
  midway_point_checks: 'true'
  room_checks: 'false'
  block_checks:
    - Coin Blocks
    - Flying Blocks
    - Green Switch Palace Blocks
    #- Invisible Blocks
    - Item Blocks
    - P-Switch Blocks
    - Yellow Switch Palace Blocks

  ###################
  # Level Shuffling #
  ###################
  starting_location: yoshis_island
  level_shuffle: 'false'
  level_effects: '0'
  carryless_exits: '0'
  swap_level_exits: 'false'
  swap_exit_count: '0'
  swap_donut_gh_exits: 'true'
  map_teleport_shuffle: 'off'
  map_transition_shuffle: 'false'

  enemy_shuffle: 'true'

  bowser_castle_doors: slow
  bowser_castle_rooms: gauntlet
  boss_shuffle: none

  ##################
  # Junk and Traps #
  ##################
  junk_fill_percentage: '0'
  trap_fill_percentage: '10'

  ice_trap_weight: medium
  stun_trap_weight: medium
  literature_trap_weight: medium
  timer_trap_weight: medium
  reverse_trap_weight: medium
  thwimp_trap_weight: medium
  fishin_trap_weight: medium
  screen_flip_trap_weight: medium
  sticky_floor_trap_weight: medium
  sticky_hands_trap_weight: medium
  pixelate_trap_weight: medium
  spotlight_trap_weight: medium
  bullet_time_trap_weight: medium
  invisibility_trap_weight: medium
  empty_item_box_trap_weight: medium

  death_link: 'false'
  trap_link: 'true'
  energy_link: 'true'
