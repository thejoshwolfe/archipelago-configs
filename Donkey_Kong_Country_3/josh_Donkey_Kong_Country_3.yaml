name: josh_dkc3
description: Defeat 5/6 world bosses, find 5/5 Cogs and 5/5 Bonus Coins (hinted), and defeat K. Rool in both locations.
game: Donkey Kong Toluca
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.
  game:
    Donkey Kong Toluca: 0.2.3 # Version of the world required for this yaml to work as expected.
Donkey Kong Toluca:
  starting_life_count: '30'

  goal: kompletionist
  required_birds: '5' # /6 world bosses
  cog_placement: anywhere
  start_hints:
    - Cog
    - Bonus Coin

  required_lake_levels: '4' # /5
  required_forest_levels: '4' # /5
  required_cove_levels: '4' # /5
  required_mekanos_levels: '4' # /5
  required_k3_levels: '4' # /5
  required_ridge_levels: '4' # /5
  required_kore_levels: '4' # /5
  required_krematoa_levels: '5' # /5

  logic: strict
  kong_checks: 'false'
  dk_coin_checks: 'true'
  balloon_checks: 'true'
  banana_checks: 'true'
  coin_checks: 'true'
  bird_checks: 'true'

  starting_kong: both
  shuffle_levels: 'false'
  shuffle_abilities:
    - Carry
    - Climb
    - Helicopter Spin
    #- Spin # Let me go fast please
    - Swim
    - Team Attack
    - Water Bounce
  shuffle_animals:
    - Ellie
    - Enguarde
    - Parry
    - Squawks
    - Squitter
  shuffle_objects:
    # - Barrel Cannon # When this is missing, it causes pretty annoying backtracking later.
    - Barrel Shield
    - Barrel Switch
    - Ghost Barrel
    - Invincibility Barrel
    - Rocket Barrel
    - Tracker Barrel
    - Warp Barrel
    - Waterfall Barrel

  energy_link: 'true'
