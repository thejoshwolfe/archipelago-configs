name: josh_p2
description: Mostly default options
game: Portal 2
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.
  game:
    Portal 2: 0.6.0 # Version of the world required for this yaml to work as expected.
Portal 2:
  game_mode:
    normal: 1
    chaotic: 0 # TODO: try this
    open_world: 0 # TODO: try this

  early_playability_percentage: '75'
  logic_difficulty: normal
  remove_locations: []
  cutscene_levels: 'false'
  wheatley_monitors: 'false'
  ratman_dens: 'false'

  ################
  # Trap Options #
  ################
  trap_fill_percentage: '10'
  motion_blur_trap_weight: medium
  fizzle_portal_trap_weight: medium
  butter_fingers_trap_weight: medium
  cube_confetti_trap_weight: medium
  slippery_floor_trap_weight: medium

  death_link: 'false'
