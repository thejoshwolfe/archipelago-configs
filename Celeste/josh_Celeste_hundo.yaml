name: celeste
game: Celeste (Open World)
description: Clear all A/B/C sides, except Farewell and Core. All sanities except keys/checkpoints.
requires:
  version: 0.6.5 # Version of Archipelago required for this yaml to work as expected.
  game:
    Celeste (Open World): 1.0.5 # Version of the world required for this yaml to work as expected.

Celeste (Open World):
  progression_balancing: '50'
  accessibility: full

  death_link: 'true'
  death_link_amnesty: '30'
  trap_link: 'true'

  ################
  # Goal Options #
  ################
  goal_area: the_summit_a

  lock_goal_area: 'false'
  total_strawberries: '20'
  strawberries_required_percentage: '100'
  junk_fill_percentage: '0'

  ####################
  # Location Options #
  ####################
  roomsanity:      'true'
  include_core:    'false'
  include_b_sides: 'true'
  include_c_sides: 'true'

  checkpointsanity: 'false'
  goal_area_checkpointsanity: 'false'
  binosanity: 'true'
  keysanity: 'false'
  gemsanity: 'true'
  carsanity: 'true'
  include_goldens: 'false'
  include_farewell: none

  ##################
  # Junk and Traps #
  ##################
  trap_fill_percentage: '10'

  trap_expiration_action: new_screens
  trap_expiration_amount: '1'

  bald_trap_weight:        medium
  literature_trap_weight:  medium
  stun_trap_weight:        medium
  invisible_trap_weight:   medium
  fast_trap_weight:        none
  slow_trap_weight:        medium
  ice_trap_weight:         medium
  reverse_trap_weight:     medium
  screen_flip_trap_weight: medium
  laughter_trap_weight:    medium
  hiccup_trap_weight:      medium
  zoom_trap_weight:        none    # Causes bugs with angry Oshiro and Boss Badaline

  #####################
  # Aesthetic Options #
  #####################
  music_shuffle: none
  require_cassettes: 'false'
  madeline_hair_length:
    very_long: 1
    absurd: 1
  madeline_one_dash_hair_color: strawberry
  madeline_two_dash_hair_color: double
  madeline_no_dash_hair_color: empty
  madeline_feather_hair_color: golden

  ###########################
  # Item & Location Options #
  ###########################
  local_items: []
  non_local_items: []
  start_inventory:
    # It's fun that torches can be missing, but not fun for me.
    Torches: 1
  start_location_hints: []
  priority_locations: []
  item_links: []
  plando_items:
    - items: {Strawberry: 20}
      count: 20
      force: True
      locations:
      - Forsaken City A - Level Clear
      - Forsaken City B - Level Clear
      - Forsaken City C - Level Clear
      - Old Site A - Level Clear
      - Old Site B - Level Clear
      - Old Site C - Level Clear
      - Celestial Resort A - Level Clear
      - Celestial Resort B - Level Clear
      - Celestial Resort C - Level Clear
      - Golden Ridge A - Level Clear
      - Golden Ridge B - Level Clear
      - Golden Ridge C - Level Clear
      - Mirror Temple A - Level Clear
      - Mirror Temple B - Level Clear
      - Mirror Temple C - Level Clear
      - Reflection A - Level Clear
      - Reflection B - Level Clear
      - Reflection C - Level Clear
      #- The Summit A - Level Clear # Always contains Granny's House Keys
      - The Summit B - Level Clear
      - The Summit C - Level Clear
