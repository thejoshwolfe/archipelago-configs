name: aw
description: Get fireworks. Easiest logic. Start with keys, matches, and F. Pack.
game: ANIMAL WELL
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.
  game:
    ANIMAL WELL: 0.5.4 # Version of the world required for this yaml to work as expected.
ANIMAL WELL:
  goal: fireworks

  candle_checks: 'true'
  bunnies_as_checks: 'off'
  bunny_warps_in_logic: 'false'
  fruitsanity: 'false'
  random_final_egg_location: 'false'

  key_ring: 'true'
  matchbox: 'true'
  start_inventory_from_pool:
    Matchbox: 1
    Key Ring: 1
    F. Pack: 1

  exclude_song_chests: 'true'
  exclude_locations:
    Future Egg Chest - R6C1 # Boring

  # Logic
  tanking_damage: 'false'
  bubble_jumping: 'off'
  disc_hopping: 'off'
  wheel_tricks: 'off'
  ball_throwing: 'off'
  flute_jumps: 'false'
  obscure_tricks: 'false'
  precise_tricks: 'false'

  death_link: 'false'
