name: josh_cotnd
description: 20 zones cleared across at least 4 characters.
game: Crypt of the NecroDancer
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.
Crypt of the NecroDancer:
  goal:
    all_zones: 0 # TODO: try this
    zones: 1
  #all_zones_goal_clear: '8'
  zones_goal_clear: '20'

  floor_clear_checks: 'true'
  dlc:
    - Amplified
    #- Synchrony
    #- Miku
    #- Shovel Knight

  starting_inventory: '0'
  starting_character:
    cadence: 1
    melody: 1
    aria: 0
    dorian: 0
    eli: 0
    monk: 0
    dove: 0
    coda: 0
    bolt: 0
    bard: 1
    # Amplified: Nocturna, Diamond, Mary, Tempo
    nocturna: 0
    diamond: 0
    mary: 0
    tempo: 0
    # Synchrony: Klarinetta, Chaunter, Suzu
    reaper: 0
    klarinetta: 0
    chaunter: 0
    suzu: 0
    # Miku: Hatsune Miku
    hatsune_miku: 0
    # Shovel Knight: Shovel Knight
    shovel_knight: 0

  character_blacklist:
    # Which characters to exclude from checks and progression. Note that this will disable the character from the run entirely if included.
    #- Cadence
    #- Melody
    - Aria
    - Dorian
    #- Eli
    #- Monk
    #- Dove
    - Coda
    - Bolt
    #- Bard
    - Nocturna # Going down stairs as bat doesn't send checks. Don't want to deal with that broken.
    - Diamond
    - Mary
    - Tempo
    - Reaper
    - Klarinetta
    - Chaunter
    - Suzu
    - Hatsune Miku
    - Shovel Knight

  character_unlocks: item_only
  include_unique_items: 'false' # Do not ask me to start as Melody with no weapon.
  include_materials: 'true'

  included_extra_modes: []

  include_codex_checks: 'false'
  lobby_npc_items: 'true'
  zone_access_keys: disabled
  starting_zone: zone_1

  lock_character_room: 'false'
  trap_percentage: '10'
  trap_weights:
    Camera Trap: 2
    Confusion Trap: 7
    Dad Trap: 2
    Dead Ringer Trap: 1
    Gold Scatter Trap: 6
    Haunted Shopkeeper Trap: 4
    Monkey Trap: 10
    No Return Trap: 3
    Skeleton Trap: 5
    Tempo Trap: 7

  price_randomization: item_class

  filler_price_min: '1'
  filler_price_max: '1'
  useful_price_min: '2'
  useful_price_max: '2'
  progression_price_min: '4'
  progression_price_max: '4'

  death_link: 'false'
